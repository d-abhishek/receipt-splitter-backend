services:
  postgres:
    image: postgres:18
    container_name: receipt-splitter-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: receipt_splitter
      POSTGRES_USER: rs_user
      POSTGRES_PASSWORD: rs_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rs_user -d receipt_splitter"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: receipt-splitter-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/receipt_splitter
      SPRING_DATASOURCE_USERNAME: rs_user
      SPRING_DATASOURCE_PASSWORD: rs_pass
    depends_on:
      postgres:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8081:80"  # Access at http://localhost:8082

volumes:
  postgres_data:
