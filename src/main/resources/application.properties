spring.application.name=Receipt Splitter Backend

# DATABASE CONFIGURATION
# Override these with SPRING_DATASOURCE_URL / USERNAME / PASSWORD in Docker or compose.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/receipt_splitter}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:rs_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rs_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SQL INIT
spring.sql.init.mode=never