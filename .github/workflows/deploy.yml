name: Deploy to AKS

on:
  push:
    branches: [ deployment ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login \
          ${{ secrets.ACR_LOGIN_SERVER }} \
          -u ${{ secrets.ACR_USERNAME }} \
          --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/receipt-splitter:latest .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/receipt-splitter:latest

  deploy-to-aks:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config

      - name: Create Kubernetes Secret
        run: |
          kubectl create secret generic db-secret \
            --from-literal=SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USER }} \
            --from-literal=SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASS }} \
            --dry-run=client -o yaml | kubectl apply -f -
          
      - name: Create ConfigMap
        run: |
          kubectl create configmap app-config \
            --from-literal=SPRING_DATASOURCE_URL=${{ secrets.DB_URL }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to AKS
        run: |
          kubectl apply -f k8s/