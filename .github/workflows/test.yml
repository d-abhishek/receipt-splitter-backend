name: CI Tests

on:
  push:
    branches: [deployment]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: receipt_splitter
          POSTGRES_USER: rs_user
          POSTGRES_PASSWORD: rs_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rs_user -d receipt_splitter"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw -B test

